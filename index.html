    const ticks=[];

    const allY=series.flatMap(s=>s.data.map(d=>d.revenue));
    const minX=Math.min(...allX),maxX=Math.max(...allX);
    const minY=Math.min(...allY,0),maxY=Math.max(...allY,1);
    const yT=calcYTicks(minY,maxY),xT=calcYTicks(minX,maxX,5);
    const rMinX=Math.min(...xT,minX),rMaxX=Math.max(...xT,maxX);
    const rMinY=Math.min(...yT,0),rMaxY=Math.max(...yT,maxY);
    const toX=v=>CM.l+((v-rMinX)/(rMaxX-rMinX))*pw;
    const toY=v=>CM.t+16+ph-((v-rMinY)/(rMaxY-rMinY))*ph;
    const base=CM.t+16+ph;
    return(
      <div style={{position:"relative"}}>
        <SvgTip tip={tip}/>
        <svg width="100%" viewBox={`0 0 ${VW} ${height}`} preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>
          <ChartLegend items={series.map(s=>({color:s.color,label:s.name}))}/>
          {yT.map((t,i)=>{const y=toY(t);return <g key={i}><line x1={CM.l} x2={CM.l+pw} y1={y} y2={y} stroke={C.border} strokeDasharray="3 3"/><text x={CM.l-6} y={y+4} fill={C.dim} fontSize={10} textAnchor="end" fontFamily="Poppins,sans-serif">{yFmt(t)}</text></g>;})}
          {xT.map((t,i)=>{const x=toX(t);return <g key={i}><line x1={x} x2={x} y1={CM.t+16} y2={base} stroke={C.border} strokeDasharray="3 3" opacity={0.3}/><text x={x} y={base+15} fill={C.dim} fontSize={10} textAnchor="middle" fontFamily="Poppins,sans-serif">{xFmt(t)}</text></g>;})}
          {series.map((s,si)=><g key={si}>{s.data.map((d,di)=><circle key={di} cx={toX(d.temp)} cy={toY(d.revenue)} r={4} fill={s.color} opacity={0.65}
            onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,text:`${s.name} — ${xFmt(d.temp)} · ${yFmt(d.revenue)}`})}
            onMouseLeave={()=>setTip(null)} style={{cursor:"default"}}/>)}</g>)}
          <line x1={CM.l} x2={CM.l+pw} y1={base} y2={base} stroke={C.border}/>
          <line x1={CM.l} x2={CM.l} y1={CM.t+16} y2={base} stroke={C.border}/>
        </svg>
      </div>
    );
  };

    const addM=(year)=>{const y=data.years.find(y=>y.year===year);upY(year,{milestones:[...y.milestones,{id:Math.max(0,...y.milestones.map(m=>m.id))+1,text:"New milestone",done:false}]});};
    const remM=(year,id)=>{const y=data.years.find(y=>y.year===year);upY(year,{milestones:y.milestones.filter(m=>m.id!==id)});};
    const upC=(key,idx,val)=>setData(d=>({...d,cascade:{...d.cascade,[key]:d.cascade[key].map((v,i)=>i===idx?val:v)}}));
    const addC=(key)=>setData(d=>({...d,cascade:{...d.cascade,[key]:[...d.cascade[key],"New item"]}}));

            <div>
              <div style={{color:C.dim,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>XSlide Vision</div>
              <div style={{fontSize:28,fontWeight:900,color:C.text,lineHeight:1.2}}>
                <span style={{color:C.copper}}>1,000 scooters</span><span style={{color:C.dim,margin:"0 12px"}}>·</span>
                <span>10+ locations</span><span style={{color:C.dim,margin:"0 12px"}}>·</span><span>Dec 31, 2031</span>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{if(confirm("Reset?"))setData(DEFAULT_VISION);}} style={{background:"transparent",color:C.red+"aa",border:`1px solid ${C.red}44`,borderRadius:8,padding:"6px 12px",fontSize:12}}>Reset</button>
            </div>
          </div>
          <div style={{display:"flex",gap:24,marginTop:20,flexWrap:"wrap"}}>
            {[["Current Fleet","72 scooters",C.text],["Active","40 scooters",C.green],["Locations","2",C.copper],["Target Year","2031",C.copper]].map(([l,v,c])=><div key={l}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div><div style={{color:c,fontSize:18,fontWeight:800}}>{v}</div></div>)}
            <div style={{marginLeft:"auto",textAlign:"right"}}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Progress to 1,000</div><div style={{color:C.copper,fontSize:18,fontWeight:800}}>7.2%</div><div style={{width:200,marginTop:4}}><BarViz pct={7.2} color={C.copper} h={6}/></div></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 400px",gap:18}}>
          <Card title="Fleet Growth 2026 → 2031" accent={C.copper}>
            <SvgAreaChart data={chartData} areas={[{key:"owned",label:"XSlide-owned",color:C.copper},{key:"franchise",label:"Franchise-owned",color:C.copperLight}]} xKey="year" height={280}/>
            <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"center"}}>
              {data.years.map(y=><button key={y.year} onClick={()=>setSel(y.year)} style={{background:sel===y.year?yC[y.year]:"transparent",color:sel===y.year?"#fff":C.dim,border:`1px solid ${sel===y.year?yC[y.year]:C.border}`,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:700,transition:"all 0.15s"}}>{y.year}</button>)}
            </div>
          </Card>
          {yd&&(
            <div style={{background:C.card,borderRadius:12,padding:"20px 24px",border:`1px solid ${C.border}`,borderTop:`3px solid ${yC[sel]}`,display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div><div style={{color:yC[sel],fontSize:28,fontWeight:900,lineHeight:1}}>{sel}</div><EditableText value={yd.label} onChange={v=>upY(sel,{label:v})} style={{color:C.dim,fontSize:13,fontWeight:600,marginTop:2,display:"block"}}/></div>
                <div style={{textAlign:"right"}}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Target</div><EditableText value={yd.range} onChange={v=>upY(sel,{range:v})} style={{color:C.text,fontSize:20,fontWeight:800}}/><div style={{color:C.dim,fontSize:10}}>scooters</div></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:C.bg,borderRadius:8,padding:"10px 12px"}}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>XSlide-owned</div><EditableText value={String(yd.owned)} onChange={v=>upY(sel,{owned:parseInt(v)||0})} style={{color:C.copper,fontSize:20,fontWeight:800}}/></div>
                <div style={{background:C.bg,borderRadius:8,padding:"10px 12px"}}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Franchise-owned</div><EditableText value={String(yd.franchise)} onChange={v=>upY(sel,{franchise:parseInt(v)||0})} style={{color:C.copperLight,fontSize:20,fontWeight:800}}/></div>
              </div>
              <div>
                <div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8,display:"flex",justifyContent:"space-between"}}><span>Milestones ({done}/{total})</span><button onClick={()=>addM(sel)} style={{background:"transparent",color:C.copper,border:"none",fontSize:12,fontWeight:700,fontFamily:"Poppins"}}>+ Add</button></div>
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:180,overflowY:"auto"}}>

                    <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,background:C.bg,borderRadius:6,padding:"7px 10px"}}>
                      <input type="checkbox" checked={m.done} onChange={()=>togM(sel,m.id)} style={{accentColor:C.copper,width:14,height:14,cursor:"pointer",flexShrink:0}}/>
                      <EditableText value={m.text} onChange={v=>editM(sel,m.id,v)} style={{fontSize:12,color:m.done?C.dim:C.text,textDecoration:m.done?"line-through":"none",flex:1}}/>
                      <button onClick={()=>remM(sel,m.id)} style={{background:"transparent",color:C.dim,border:"none",fontSize:14,lineHeight:1,padding:"0 2px",fontFamily:"Poppins"}}>×</button>

              {yd.gate&&<div style={{background:`${yC[sel]}15`,borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${yC[sel]}`}}><div style={{color:C.dim,fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Gate</div><EditableText value={yd.gate} onChange={v=>upY(sel,{gate:v})} multiline style={{fontSize:12,color:C.text}}/></div>}
            </div>
          )}
        </div>
        <Card title="2026 Goal Cascade — 5yr to Weekly" accent={C.copper}>
          <div style={{overflowX:"auto",paddingBottom:8}}>
            <div style={{display:"flex",gap:12,minWidth:900}}>
              {cols.map((col,ci)=>{
                const isLast=ci===cols.length-1;
                const cc=ci===0?C.copper:ci===1?C.copperLight:ci<4?C.yellow:ci===4?C.green:ci===5?C.blue:C.purple;
                return(
                  <div key={col.key} style={{flex:1,minWidth:120,display:"flex",alignItems:"center"}}>

                      <div style={{color:cc,fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:0.5}}>{col.label}</div>
                      <div style={{color:C.dim,fontSize:10,marginBottom:10}}>{col.sub}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {data.cascade[col.key].map((item,i)=>(
                          <div key={i} style={{display:"flex",gap:4,alignItems:"flex-start"}}>
                            <span style={{color:cc,fontSize:14,lineHeight:1.4,flexShrink:0}}>›</span>
                            <EditableText value={item} onChange={v=>upC(col.key,i,v)} multiline style={{fontSize:11,color:C.text,lineHeight:1.4,flex:1}}/>
                            <button onClick={()=>remC(col.key,i)} style={{background:"transparent",color:C.dim+"66",border:"none",fontSize:12,padding:"0 2px",flexShrink:0,fontFamily:"Poppins"}}>×</button>
                          </div>
                        ))}
                      </div>
                      <button onClick={()=>addC(col.key)} style={{marginTop:8,background:"transparent",color:cc,border:`1px dashed ${cc}44`,borderRadius:6,padding:"3px 8px",fontSize:10,width:"100%"}}>+ add</button>
                    </div>

            </div>

      </div>

  // ─── POW Tracker ─────────────────────────────────────────────────────
  const PEOPLE=["kostas","panos","tsoutsos"];
  const PERSON_COLOR={kostas:C.blue,panos:C.green,tsoutsos:C.purple};
  const CATEGORIES=["Business Related","Service Related","Xslide Related"];

  const TaskCard=({task})=>(
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px",borderLeft:`3px solid ${task.assignees.length?PERSON_COLOR[task.assignees[0]]||C.dim:C.border}`}}>
      <div style={{fontSize:13,fontWeight:500,color:C.text,lineHeight:1.45,marginBottom:10}}>{task.title}</div>
      {task.assignees.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{task.assignees.map(a=><span key={a} style={{background:PERSON_COLOR[a]+"22",color:PERSON_COLOR[a],fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,border:`1px solid ${PERSON_COLOR[a]}44`}}>{a.charAt(0).toUpperCase()+a.slice(1)}</span>)}</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.dim}}>{task.category}</span><span style={{fontSize:11,background:C.card,color:C.dim,padding:"2px 8px",borderRadius:4,border:`1px solid ${C.border}`}}>{task.status}</span></div>
    </div>
  );

  function WeeklyTab({powData}) {
    const [weekIdx,setWeekIdx]=useState(powData.length-1);
    const week=powData[weekIdx]||powData[0];
    const tasksByCat=useMemo(()=>{const m={};CATEGORIES.forEach(c=>{m[c]=[]});(week.tasks||[]).forEach(t=>{if(m[t.category])m[t.category].push(t);else m["Business Related"].push(t);});return m;},[week]);
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,flexWrap:"wrap"}}>
          <button onClick={()=>setWeekIdx(i=>Math.max(0,i-1))} style={{padding:"8px 16px",background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,fontWeight:600}}>← Prev</button>
          <div style={{padding:"10px 20px",background:C.card,border:`1px solid ${C.border}`,borderRadius:6,borderLeft:`3px solid ${C.purple}`}}>
            <span style={{fontWeight:700,color:C.text}}>Week {week.week_number}</span>
            <span style={{color:C.dim,fontSize:12,marginLeft:12}}>{week.start_date||"Date TBD"}</span>
            <span style={{color:C.dim,fontSize:12,marginLeft:12}}>— {week.tasks?.length||0} tasks</span>
          </div>
          <button onClick={()=>setWeekIdx(i=>Math.min(powData.length-1,i+1))} style={{padding:"8px 16px",background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,fontWeight:600}}>Next →</button>
          <select value={weekIdx} onChange={e=>setWeekIdx(Number(e.target.value))} style={{maxWidth:180}}>{powData.map((w,i)=><option key={i} value={i}>Week {w.week_number} — {w.start_date||"TBD"}</option>)}</select>
        </div>
        {CATEGORIES.map(cat=>{const tasks=tasksByCat[cat]||[];if(!tasks.length)return null;return(
          <div key={cat} style={{marginBottom:28}}>
            <div style={{fontSize:13,fontWeight:700,color:C.cyan,textTransform:"uppercase",letterSpacing:1,marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>{cat} — {tasks.length} tasks</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>{tasks.map(t=><TaskCard key={t.id} task={t}/>)}</div>
          </div>
        );})}
      </div>
    );
  }

  function PersonTab({allTasks,leaderboard}) {
    const [person,setPerson]=useState("kostas");
    const tasks=useMemo(()=>allTasks.filter(t=>t.assignees.includes(person)),[allTasks,person]);
    return(
      <div>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          {PEOPLE.map(p=><button key={p} onClick={()=>setPerson(p)} style={{padding:"8px 20px",background:person===p?PERSON_COLOR[p]:"transparent",border:`1px solid ${person===p?PERSON_COLOR[p]:C.border}`,color:person===p?"#fff":C.dim,borderRadius:6,fontWeight:600,fontSize:13}}>{p.charAt(0).toUpperCase()+p.slice(1)} ({leaderboard[p]})</button>)}
        </div>
        <div style={{marginBottom:16,padding:"12px 16px",background:C.card,borderRadius:8,borderLeft:`3px solid ${PERSON_COLOR[person]}`}}>
          <span style={{color:C.dim,fontSize:13}}>{tasks.length} tasks assigned to </span><strong style={{color:PERSON_COLOR[person]}}>{person.charAt(0).toUpperCase()+person.slice(1)}</strong>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>{tasks.map(t=><TaskCard key={t.id} task={t}/>)}</div>
      </div>

  }

  function HistoryTab({allTasks}) {
    const [query,setQuery]=useState("");
    const [catFilter,setCatFilter]=useState("all");
    const filtered=useMemo(()=>{let t=[...allTasks].reverse();if(query)t=t.filter(x=>x.title.toLowerCase().includes(query.toLowerCase()));if(catFilter!=="all")t=t.filter(x=>x.category===catFilter);return t;},[allTasks,query,catFilter]);
    return(
      <div>
        <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search tasks..." style={{maxWidth:320}}/>
          <div style={{display:"flex",gap:6}}>{["all",...CATEGORIES].map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{padding:"7px 14px",background:catFilter===c?C.purple:"transparent",border:`1px solid ${catFilter===c?C.purple:C.border}`,color:catFilter===c?"#fff":C.dim,borderRadius:6,fontSize:12,fontWeight:600}}>{c==="all"?"All":c.replace(" Related","")}</button>)}</div>
          <span style={{color:C.dim,fontSize:13}}>{filtered.length} tasks</span>
        </div>

  // ─── Weather Helpers ──────────────────────────────────────────────────
  function wLinReg(pts){const n=pts.length;if(n<2)return{m:0,b:0,r2:0};let sx=0,sy=0,sxy=0,sxx=0;for(const[x,y]of pts){sx+=x;sy+=y;sxy+=x*y;sxx+=x*x;}const m=(n*sxy-sx*sy)/(n*sxx-sx*sx)||0;const b=(sy-m*sx)/n;const yb=sy/n;const sst=pts.reduce((a,[,y])=>a+(y-yb)**2,0);const sse=pts.reduce((a,[x,y])=>a+(y-(m*x+b))**2,0);return{m,b,r2:sst===0?0:Math.max(0,1-sse/sst)};}
  async function wFetchHist(lat,lon,start,end){const u=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${end}&daily=temperature_2m_max,precipitation_sum,windspeed_10m_max&timezone=Europe%2FAthens`;const d=await(await fetch(u)).json();const r={};d.daily.time.forEach((dt,i)=>{r[dt]={temp:d.daily.temperature_2m_max[i],rain:d.daily.precipitation_sum[i],wind:d.daily.windspeed_10m_max[i]};});return r;}
  async function wFetchForecast(lat,lon){const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,precipitation_sum,windspeed_10m_max&timezone=Europe%2FAthens&forecast_days=7`;const d=await(await fetch(u)).json();return d.daily.time.map((dt,i)=>({date:dt,temp:d.daily.temperature_2m_max[i],rain:d.daily.precipitation_sum[i],wind:d.daily.windspeed_10m_max[i]}));}
  function wIcon(temp,rain,wind){if(rain>5)return"🌧️";if(rain>1)return"🌦️";if(wind>40)return"💨";if(temp>30)return"☀️";if(temp>22)return"🌤️";if(temp>14)return"⛅";return"🌥️";}
  function WStatCard({label,value,sub,color}){return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px"}}><div style={{fontSize:11,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>{label}</div><div style={{fontSize:24,fontWeight:700,color:color||C.text,margin:"4px 0 2px"}}>{value}</div>{sub&&<div style={{fontSize:12,color:C.dim}}>{sub}</div>}</div>);}
  function WForecastCard({day,predicted}){const icon=wIcon(day.temp,day.rain,day.wind);const dt=new Date(day.date+"T12:00:00");const isRainy=day.rain>1;return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 12px",textAlign:"center",flex:1,minWidth:110}}><div style={{fontSize:11,color:C.dim}}>{dt.toLocaleDateString("en",{weekday:"short"})}</div><div style={{fontSize:11,color:C.dim,marginBottom:6}}>{dt.toLocaleDateString("en",{month:"short",day:"numeric"})}</div><div style={{fontSize:34,marginBottom:4}}>{icon}</div><div style={{fontSize:20,fontWeight:700,color:C.text}}>{Math.round(day.temp)}°C</div><div style={{fontSize:11,color:isRainy?"#0ea5e9":"#f59e0b",marginBottom:6}}>{isRainy?"Rain":"Sunny"}</div>{day.rain>0&&<div style={{fontSize:11,color:"#0ea5e9"}}>💧 {day.rain.toFixed(1)}mm</div>}{predicted!=null&&(<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.dim}}>Est. Revenue</div><div style={{fontSize:18,fontWeight:700,color:C.green}}>€{Math.max(0,Math.round(predicted))}</div></div>)}</div>);}

  function WeatherModule({tab,city,range,setCity,setRange}) {
    const cityObj=WEATHER_CITIES[city];
    const [weather,setWeather]=useState(null);
    const [forecast,setForecast]=useState(null);
    const [loading,setLoading]=useState(true);
    useEffect(()=>{
      setLoading(true);setWeather(null);setForecast(null);
      if(!cityObj.data.length){wFetchForecast(cityObj.lat,cityObj.lon).then(fc=>{setForecast(fc);setLoading(false);});return;}
      const dates=cityObj.data.map(r=>r.date).sort();
      Promise.all([wFetchHist(cityObj.lat,cityObj.lon,dates[0],dates[dates.length-1]),wFetchForecast(cityObj.lat,cityObj.lon)]).then(([w,fc])=>{setWeather(w);setForecast(fc);setLoading(false);});
    },[city]);
    if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:360,flexDirection:"column",gap:16}}><div style={{fontSize:48}}>⛅</div><div style={{color:C.dim,fontSize:15}}>Fetching weather from Open-Meteo…</div><div style={{color:C.border,fontSize:12}}>No API key · 100% free</div></div>);
    const citySel=(<div style={{display:"flex",gap:6,marginBottom:16}}>{Object.entries(WEATHER_CITIES).map(([k,v])=><button key={k} onClick={()=>setCity(k)} style={{padding:"6px 16px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,background:city===k?v.color:C.card,color:city===k?"#fff":C.dim,transition:"all .15s"}}>{v.name}</button>)}</div>);
    if(!cityObj.data.length)return(<div>{citySel}<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20,marginBottom:16,color:C.dim}}>📍 No revenue data for {cityObj.name} yet — forecast only.</div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{forecast&&forecast.map((d,i)=><WForecastCard key={i} day={d} predicted={null}/>)}</div></div>);
    const joined=cityObj.data.filter(r=>weather&&weather[r.date]).map(r=>({...r,temp:weather[r.date].temp,rain:weather[r.date].rain,wind:weather[r.date].wind,rainy:weather[r.date].rain>1}));
    const reg=wLinReg(joined.map(r=>[r.temp,r.revenue]));
    const rainyDays=joined.filter(r=>r.rain>1),sunnyDays=joined.filter(r=>r.rain<=1);
    const avgRainy=rainyDays.length?rainyDays.reduce((s,r)=>s+r.revenue,0)/rainyDays.length:0;
    const avgSunny=sunnyDays.length?sunnyDays.reduce((s,r)=>s+r.revenue,0)/sunnyDays.length:0;
    const rainImpact=avgSunny>0?((avgRainy-avgSunny)/avgSunny*100):0;
    const buckets={};joined.forEach(r=>{const b=Math.floor(r.temp/5)*5;if(!buckets[b])buckets[b]={sum:0,n:0};buckets[b].sum+=r.revenue;buckets[b].n++;});
    const bestBucket=Object.entries(buckets).map(([k,v])=>([parseInt(k),v.sum/v.n])).sort((a,b)=>b[1]-a[1])[0];
    const bucketChart=Object.entries(buckets).map(([k,v])=>({range:`${k}–${parseInt(k)+5}°`,avg:Math.round(v.sum/v.n),t:parseInt(k)})).sort((a,b)=>a.t-b.t);
    const forecastWithPred=(forecast||[]).map(d=>({...d,predicted:Math.max(0,reg.m*d.temp+reg.b+(d.rain>1?(avgRainy-avgSunny):0))}));
    const forecastTotal=forecastWithPred.reduce((s,d)=>s+d.predicted,0);
    const timelineData=joined.slice(-Math.min(range,joined.length)).map(r=>({date:r.date.slice(5),revenue:r.revenue,temp:Math.round(r.temp*10)/10,rain:r.rain}));
    const statCards=(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
      <WStatCard label="Avg Sunny Day" value={`€${Math.round(avgSunny)}`} sub={`${sunnyDays.length} days`} color="#f59e0b"/>
      <WStatCard label="Avg Rainy Day" value={`€${Math.round(avgRainy)}`} sub={`${rainyDays.length} days`} color="#0ea5e9"/>
      <WStatCard label="Rain Impact" value={`${rainImpact>0?"+":""}${Math.round(rainImpact)}%`} sub="vs sunny days" color={rainImpact<-5?"#ef4444":"#10b981"}/>
      <WStatCard label="Sweet Spot" value={bestBucket?`${bestBucket[0]}–${bestBucket[0]+5}°C`:"N/A"} sub={bestBucket?`€${Math.round(bestBucket[1])}/day`:""} color="#f97316"/>
      <WStatCard label="Rev per °C" value={`€${Math.abs(reg.m).toFixed(1)}`} sub={`R²=${reg.r2.toFixed(2)}`} color={cityObj.color}/>
      <WStatCard label="7-Day Forecast" value={`€${Math.round(forecastTotal)}`} sub="projected total" color={C.green}/>
    </div>);
    return(
      <div>
        {citySel}{statCards}
        {tab==="timeline"&&(<>
          <div style={{display:"flex",gap:6,marginBottom:12}}>{[30,60,90,180,365].map(d=><button key={d} onClick={()=>setRange(d)} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,background:range===d?cityObj.color:C.card,color:range===d?"#fff":C.dim}}>{d}d</button>)}</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px 12px"}}>
            <div style={{fontSize:13,color:C.dim,paddingLeft:8,marginBottom:10}}>Daily Revenue vs Max Temperature · Blue = rainy (&gt;1mm)</div>
            <SvgComposedChart data={timelineData} barKey="revenue" barColorFn={d=>d.rain>1?"#0ea5e9":cityObj.color} lineKey="temp" lineColor="#f97316" xKey="date" height={340} yFmtL={v=>`€${Math.round(v)}`} yFmtR={v=>`${v}°`}/>
            <div style={{display:"flex",gap:20,justifyContent:"center",marginTop:8,fontSize:11,color:C.dim}}>
              <span><span style={{color:cityObj.color}}>■</span> Dry revenue</span>
              <span><span style={{color:"#0ea5e9"}}>■</span> Rainy revenue</span>
              <span><span style={{color:"#f97316"}}>─</span> Max Temp</span>
            </div>
          </div>
        </>)}
        {tab==="correlation"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px 12px"}}>
              <div style={{fontSize:13,color:C.dim,paddingLeft:8,marginBottom:8}}>Temperature vs Revenue — each dot = 1 day</div>
              <SvgScatterChart series={[{name:"Sunny",color:"#f59e0b",data:joined.filter(r=>!r.rainy).map(r=>({temp:Math.round(r.temp),revenue:Math.round(r.revenue)}))},{name:"Rainy",color:"#0ea5e9",data:joined.filter(r=>r.rainy).map(r=>({temp:Math.round(r.temp),revenue:Math.round(r.revenue)}))}]} height={300} xFmt={v=>`${v}°C`} yFmt={v=>`€${v}`}/>
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px 12px"}}>
              <div style={{fontSize:13,color:C.dim,paddingLeft:8,marginBottom:8}}>Avg Revenue by Temperature Range</div>
              <SvgBarChart data={bucketChart} bars={[{key:"avg",label:"Avg Revenue",color:C.copper,cellColorFn:d=>{const t=d.t;return t>=25?"#f97316":t>=20?"#f59e0b":t>=15?"#10b981":t>=10?"#14b8a6":"#0ea5e9";}}]} xKey="range" height={300} yFmt={v=>`€${v}`}/>
              <div style={{paddingLeft:8,marginTop:6,fontSize:11,color:C.dim}}>Best: <span style={{color:"#f97316",fontWeight:600}}>{bestBucket?`${bestBucket[0]}–${bestBucket[0]+5}°C`:""}</span>{" · "}Slope: <span style={{color:cityObj.color,fontWeight:600}}>€{Math.abs(reg.m).toFixed(1)}/°C</span>{" · "}R²: <span style={{color:reg.r2>0.4?"#10b981":"#f59e0b",fontWeight:600}}>{reg.r2.toFixed(2)}</span></div>
            </div>
          </div>
        )}
        {tab==="forecast"&&(
          <div>
            <div style={{fontSize:13,color:C.dim,marginBottom:14}}>Predictions from {joined.length} days history · Model: €{reg.m.toFixed(1)}×temp {reg.b>=0?"+":""}{reg.b.toFixed(0)} ± rain adj · R²={reg.r2.toFixed(2)}</div>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>{forecastWithPred.map((d,i)=><WForecastCard key={i} day={d} predicted={d.predicted}/>)}</div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px 12px"}}>
              <div style={{fontSize:13,color:C.dim,paddingLeft:8,marginBottom:8}}>Projected Revenue — next 7 days</div>
              <SvgComposedChart data={forecastWithPred.map(d=>({...d,date:d.date.slice(5)}))} barKey="predicted" barColorFn={d=>d.rain>1?"#0ea5e9":cityObj.color} lineKey="temp" lineColor="#f97316" xKey="date" height={220} yFmtL={v=>`€${Math.round(v)}`} yFmtR={v=>`${v}°`}/>
            </div>
          </div>
        )}
      </div>
    );
  }

    const activeScooters=FLEET.corinth.active+FLEET.nafplion.active;

    const cLifetime=REV.corinth.reduce((s,d)=>s+d.revenue,0);
    const nLifetime=REV.nafplion.reduce((s,d)=>s+d.revenue,0);
    const combined=useMemo(()=>{const m={};REV.corinth.forEach(d=>{if(!m[d.month])m[d.month]={month:d.month,corinth:0,nafplion:0,trips:0};m[d.month].corinth=d.revenue;m[d.month].trips+=d.trips;});REV.nafplion.forEach(d=>{if(!m[d.month])m[d.month]={month:d.month,corinth:0,nafplion:0,trips:0};m[d.month].nafplion=d.revenue;m[d.month].trips+=d.trips;});return sortMonths(Object.values(m));},[]);
    const expCats=useMemo(()=>{const c={};allExpenses.forEach(e=>{c[e.category]=(c[e.category]||0)+e.amount;});return Object.entries(c).map(([name,value])=>({name:name.charAt(0).toUpperCase()+name.slice(1),value:Math.round(value*100)/100}));},[allExpenses]);
    const derived={totalFixed,totalDebt,debtService,activeScooters,totalRepair,totalFleet:72,totalExDonors:72-DONOR_SCOOTERS-1,latestC,latestN,marRevenue,costPerDay,revPerDay,margin,avgPerTrip,cLifetime,nLifetime};

    const activeTabs=mod==="ops"?OPS_TABS:mod==="pow"?POW_TABS:WTABS;
    const activeTab=mod==="ops"?opsTab:mod==="pow"?powTab:wTab;
    const setActiveTab=mod==="ops"?setOpsTab:mod==="pow"?setPowTab:setWTab;
    const modColor=mod==="ops"?C.copper:mod==="pow"?C.purple:C.teal;

    return(
      <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
        <div style={{borderBottom:`1px solid ${C.border}`,padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg,zIndex:100}}>
          <div>
            <span style={{fontSize:20,fontWeight:900,color:C.copper,letterSpacing:-0.5}}>XSlide</span>
            <span style={{color:C.dim,fontSize:13,marginLeft:10,fontWeight:500}}>Command Center</span>
            <div style={{color:C.dim,fontSize:11,marginTop:1}}>April 2026</div>
          </div>
          <div style={{display:"flex",gap:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:3}}>
            <button onClick={()=>setMod("ops")} style={{padding:"7px 18px",background:mod==="ops"?C.copper:"transparent",border:"none",color:mod==="ops"?"#fff":C.dim,borderRadius:6,fontWeight:700,fontSize:13,transition:"all 0.2s"}}>📊 Operations</button>
            <button onClick={()=>setMod("pow")} style={{padding:"7px 18px",background:mod==="pow"?C.purple:"transparent",border:"none",color:mod==="pow"?"#fff":C.dim,borderRadius:6,fontWeight:700,fontSize:13,transition:"all 0.2s"}}>📋 POW Tracker</button>
            <button onClick={()=>setMod("weather")} style={{padding:"7px 18px",background:mod==="weather"?C.teal:"transparent",border:"none",color:mod==="weather"?"#fff":C.dim,borderRadius:6,fontWeight:700,fontSize:13,transition:"all 0.2s"}}>🌤️ Weather</button>
          </div>
        </div>
        <div style={{borderBottom:`1px solid ${C.border}`,padding:"0 28px",background:C.card,display:"flex",gap:2,overflowX:"auto"}}>
          {activeTabs.map(t=><button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"12px 18px",background:"transparent",border:"none",color:activeTab===t.id?modColor:C.dim,borderBottom:`3px solid ${activeTab===t.id?modColor:"transparent"}`,fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",transition:"color 0.2s"}}>{t.label}</button>)}
        </div>
        <div style={{padding:"28px 28px 48px",maxWidth:1400,margin:"0 auto"}}>
          {mod==="ops"&&(<>
            {opsTab==="overview"  &&<OverviewTab derived={derived} combined={combined} expCats={expCats}/>}
            {opsTab==="unit-econ" &&<UnitEconTab derived={derived} combined={combined}/>}
            {opsTab==="fleet"     &&<FleetTab derived={derived} combined={combined}/>}
            {opsTab==="pl"        &&<PLTab derived={derived} combined={combined}/>}
            {opsTab==="expense"   &&<ExpenseIntakeTab allExpenses={allExpenses} userExpenses={userExpenses} onAdd={e=>setUserExpenses(n=>[...n,e])} onRemove={id=>setUserExpenses(n=>n.filter(e=>e.id!==id))} derived={derived}/>}
            {opsTab==="vision"    &&<VisionTab/>}
          </>)}
          {mod==="pow"&&(<>
            {powTab==="weekly"      &&<WeeklyTab powData={powData}/>}
            {powTab==="person"      &&<PersonTab allTasks={allTasks} leaderboard={leaderboard}/>}
            {powTab==="history"     &&<HistoryTab allTasks={allTasks}/>}
            {powTab==="add"         &&<AddTaskTab onAdd={t=>setNewTasks(n=>[...n,t])}/>}
            {powTab==="leaderboard" &&<LeaderboardTab leaderboard={leaderboard} allTasks={allTasks} powData={powData}/>}
          </>)}
          {mod==="weather"&&<WeatherModule tab={wTab} city={wCity} range={wRange} setCity={setWCity} setRange={setWRange}/>}
        </div>
        <div style={{borderTop:`1px solid ${C.border}`,padding:"10px 28px",textAlign:"center",color:C.dim,fontSize:11}}>
          XSlide Command Center · Nafplion + Corinth · POW: {powData.length} weeks · Built with Cowork
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
