    function App() {
      const [module, setModule] = useState("ops");
      const [opsTab, setOpsTab] = useState("overview");
      const [powTab, setPowTab] = useState("weekly");
      const [newTasks, setNewTasks] = useState([]);

      useEffect(()=>{
        try { const s=localStorage.getItem("pow_new_tasks"); if(s) setNewTasks(JSON.parse(s)); } catch(e){}
      },[]);

      useEffect(()=>{
        try { localStorage.setItem("pow_new_tasks",JSON.stringify(newTasks)); } catch(e){}
      },[newTasks]);

      const powData = useMemo(()=>POW_RAW,[]);

      const allTasks = useMemo(()=>{
        const historical = powData.flatMap(w=>w.tasks.map(t=>({...t,week_number:w.week_number})));
        return [...historical, ...newTasks];
      },[powData,newTasks]);

      const leaderboard = useMemo(()=>{
        const c={kostas:0,panos:0,tsoutsos:0};
        allTasks.forEach(t=>t.assignees.forEach(a=>{ if(c[a]!==undefined) c[a]++; }));
        return c;
      },[allTasks]);

      const totalFixed  = EXPENSES.reduce((s,e)=>s+e.amount,0);
      const totalDebt   = DEBT_LINES.reduce((s,d)=>s+d.balance,0);
      const debtService = DEBT_LINES.reduce((s,d)=>s+d.monthly,0);
      const activeScooters = FLEET.corinth.active+FLEET.nafplion.active;
      const totalRepair = FLEET.corinth.repairHub+FLEET.nafplion.repairHub;
      const latestC = REV.corinth[REV.corinth.length-1];
      const latestN = REV.nafplion[REV.nafplion.length-1];
      const marRevenue = latestC.revenue+latestN.revenue;
      const costPerDay = totalFixed/30/activeScooters;
      const revPerDay  = (marRevenue/24)/activeScooters;
      const margin = revPerDay-costPerDay;
      const avgPerTrip = marRevenue/(latestC.trips+latestN.trips);
      const cLifetime = REV.corinth.reduce((s,d)=>s+d.revenue,0);
      const nLifetime = REV.nafplion.reduce((s,d)=>s+d.revenue,0);

      const combined = useMemo(()=>{
        const m={};
        REV.corinth.forEach(d=>{ if(!m[d.month]) m[d.month]={month:d.month,corinth:0,nafplion:0,trips:0}; m[d.month].corinth=d.revenue; m[d.month].trips+=d.trips; });
        REV.nafplion.forEach(d=>{ if(!m[d.month]) m[d.month]={month:d.month,corinth:0,nafplion:0,trips:0}; m[d.month].nafplion=d.revenue; m[d.month].trips+=d.trips; });
        return sortMonths(Object.values(m));
      },[]);

      const expCats = useMemo(()=>{
        const c={}; EXPENSES.forEach(e=>{c[e.category]=(c[e.category]||0)+e.amount;});
        return Object.entries(c).map(([name,value])=>({name:name.charAt(0).toUpperCase()+name.slice(1),value:Math.round(value*100)/100}));
      },[]);

      const derived = {totalFixed,totalDebt,debtService,activeScooters,totalRepair,latestC,latestN,marRevenue,costPerDay,revPerDay,margin,avgPerTrip,cLifetime,nLifetime};

      const OPS_TABS  = [{id:"overview",label:"Overview"},{id:"unit-econ",label:"Unit Economics"},{id:"fleet",label:"Fleet"},{id:"pl",label:"P&L"},{id:"corfu",label:"Corfu Launch"}];
      const POW_TABS  = [{id:"weekly",label:"Weekly"},{id:"person",label:"By Person"},{id:"history",label:"History"},{id:"add",label:"➕ Add Tasks"},{id:"leaderboard",label:"🏆 Leaderboard"}];

      return (
        <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
          {/* Top header */}
          <div style={{borderBottom:`1px solid ${C.border}`,padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg,zIndex:100}}>
            <div>
              <span style={{fontSize:20,fontWeight:800,background:`linear-gradient(135deg,${C.blue},${C.purple})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Micromobility Greece</span>
              <span style={{color:C.dim,fontSize:13,marginLeft:10}}>Command Center</span>
            </div>
            {/* Module switch */}
            <div style={{display:"flex",gap:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:3}}>
              <button onClick={()=>setModule("ops")} style={{padding:"7px 18px",background:module==="ops"?C.blue:"transparent",border:"none",color:module==="ops"?"#fff":C.dim,borderRadius:6,fontWeight:700,fontSize:13,transition:"all 0.2s"}}>📊 Operations</button>
              <button onClick={()=>setModule("pow")} style={{padding:"7px 18px",background:module==="pow"?C.purple:"transparent",border:"none",color:module==="pow"?"#fff":C.dim,borderRadius:6,fontWeight:700,fontSize:13,transition:"all 0.2s"}}>📋 POW Tracker</button>
            </div>
          </div>

          {/* Sub-tabs */}
          <div style={{borderBottom:`1px solid ${C.border}`,padding:"0 28px",background:C.card,display:"flex",gap:2,overflowX:"auto"}}>
            {(module==="ops"?OPS_TABS:POW_TABS).map(t=>(
              <button key={t.id} onClick={()=>module==="ops"?setOpsTab(t.id):setPowTab(t.id)}
                style={{padding:"12px 18px",background:"transparent",border:"none",color:(module==="ops"?opsTab:powTab)===t.id?(module==="ops"?C.blue:C.purple):C.dim,borderBottom:`3px solid ${(module==="ops"?opsTab:powTab)===t.id?(module==="ops"?C.blue:C.purple):"transparent"}`,fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",transition:"color 0.2s"}}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{padding:"28px 28px 48px",maxWidth:1400,margin:"0 auto"}}>
            {module==="ops" && (
              <>
                {opsTab==="overview"   && <OverviewTab derived={derived} combined={combined} expCats={expCats}/>}
                {opsTab==="unit-econ"  && <UnitEconTab derived={derived} combined={combined}/>}
                {opsTab==="fleet"      && <FleetTab derived={derived} combined={combined}/>}
                {opsTab==="pl"         && <PLTab derived={derived} combined={combined}/>}
                {opsTab==="corfu"      && <CorfuTab/>}
              </>
            )}
            {module==="pow" && (
              <>
                {powTab==="weekly"      && <WeeklyTab powData={powData}/>}
                {powTab==="person"      && <PersonTab allTasks={allTasks} leaderboard={leaderboard}/>}
                {powTab==="history"     && <HistoryTab allTasks={allTasks}/>}
                {powTab==="add"         && <AddTaskTab onAdd={t=>setNewTasks(n=>[...n,t])}/>}
                {powTab==="leaderboard" && <LeaderboardTab leaderboard={leaderboard} allTasks={allTasks} powData={powData}/>}
              </>
            )}
          </div>

          <div style={{borderTop:`1px solid ${C.border}`,padding:"10px 28px",textAlign:"center",color:C.dim,fontSize:11}}>
            Micromobility Greece — XSlide Operations · Data: Hopp Analytics (Fleet 532 + 544) · POW: {powData.length} weeks · Built with Cowork
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
